<div class="hdr-right">
  <div class="time-display">LOCAL TIME</div>
  <span id="liveClock">--:--:--</span>

  <!-- NEW: ESP CONNECT -->
  <div style="margin-top:10px;">
    <input 
      type="text" 
      id="espIp" 
      placeholder="ESP IP (e.g. 192.168.1.23)" 
      style="padding:4px 6px; font-size:10px; width:140px; border-radius:4px; border:1px solid #444; background:#111; color:#fff;"
    >
    <button 
      onclick="connectESP()" 
      style="padding:4px 8px; font-size:10px; margin-left:4px; border:none; border-radius:4px; background:#4ade80; color:#000; cursor:pointer;"
    >
      CONNECT
    </button>
  </div>
</div>
